    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #F8FAFC; font-family: "Nunito","Poppins", system-ui, -apple-system, sans-serif; }
      #root { height: 100%; }
      #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; font-family: "Nunito",sans-serif; }
      #loading img { width: 70px; height: auto; opacity: 0.9; animation: pulse 2s ease-in-out infinite; }
      #loading .lbl { text-align:center; }
      #loading .lbl .super { display:block; font-weight:300; font-size:13px; color:#64748B; letter-spacing:0.06em; }
      #loading .lbl .name { display:block; font-weight:900; font-size:26px; color:#1C5A2A; letter-spacing:-0.01em; line-height:1; }
      #loading .lbl small { display:block; font-weight:400; color:#64748B; font-size:12px; margin-top:8px; }
      #loading .accent { width:120px; height:3px; background:#7DD105; border-radius:2px; }
      @keyframes pulse { 0%,100% { opacity: 0.85; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
      details > summary { list-style: none; }
      details > summary::-webkit-details-marker { display: none; }
    </style>
